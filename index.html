<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meta OAuth Demo</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 24px;">
  <h2>Meta OAuth Demo (Instagram Messaging)</h2>
  <p>This page is used only for Meta App Review screen recording.</p>

  <button id="btn" style="padding: 12px 16px; font-size: 16px; cursor: pointer;">
    Connect with Facebook / Instagram
  </button>

  <pre id="out" style="margin-top:16px; background:#f4f4f4; padding:12px; border-radius:8px;"></pre>

  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get("code");
    const error = params.get("error");
    const errorDesc = params.get("error_description");

    const out = document.getElementById("out");
    if (code) out.textContent = "Returned with code:\\n" + code + "\\n\\n(For review demo only)";
    if (error) out.textContent = "OAuth error:\\n" + error + "\\n" + (errorDesc || "");

    // TODO: replace the placeholders below
    const APP_ID = "PUT_YOUR_APP_ID_HERE";
    const REDIRECT_URI = "https://JuniorFigueiredo2007.github.io/meta-oauth-demo/";
    const STATE = "review-demo";

    document.getElementById("btn").onclick = () => {
      const scope = [
        "instagram_manage_messages",
        "pages_manage_metadata",
        "pages_messaging"
      ].join(",");

      const url =
        "https://www.facebook.com/v19.0/dialog/oauth" +
        "?client_id=" + encodeURIComponent(APP_ID) +
        "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
        "&state=" + encodeURIComponent(STATE) +
        "&response_type=code" +
        "&scope=" + encodeURIComponent(scope);

      location.href = url;
    };
  </script>
</body>
</html>
